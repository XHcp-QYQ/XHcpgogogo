name: Playwright CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  PLAYWRIGHT_REPORT_DIR: workbuddy-test-results/html-report

jobs:
  playwright:
    name: Run Playwright tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CI: true
      HEADLESS: true
      CAPTCHA_MODE: env
      CAPTCHA_PROMPT_TIMEOUT_MS: 30000
      BASE_URL: ${{ secrets.BASE_URL }}
      TEST_ACCOUNT: ${{ secrets.TEST_ACCOUNT }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      GRAPHIC_CODE: ${{ secrets.GRAPHIC_CODE }}
      PRODUCT_ROW_NAME: ${{ secrets.PRODUCT_ROW_NAME }}
      PURCHASE_QTY: ${{ secrets.PURCHASE_QTY }}
      ADDRESS_ROW_NAME: ${{ secrets.ADDRESS_ROW_NAME }}
      PAYMENT_TERM: ${{ secrets.PAYMENT_TERM }}
      FIRST_PAYMENT_METHOD: ${{ secrets.FIRST_PAYMENT_METHOD }}
      BALANCE_ROW_NAME: ${{ secrets.BALANCE_ROW_NAME }}
      BALANCE_PAYMENT_METHOD: ${{ secrets.BALANCE_PAYMENT_METHOD }}
      DELIVERY_DAY: ${{ secrets.DELIVERY_DAY }}
      DELIVERY_DAY_INDEX: ${{ secrets.DELIVERY_DAY_INDEX }}
      ORDER_NUMBER: ${{ secrets.ORDER_NUMBER }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: |
            workbuddy-test-results/
            test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Setup GitHub Pages
        if: always() && github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload Playwright HTML report to Pages
        if: always() && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.PLAYWRIGHT_REPORT_DIR }}

  deploy-report:
    name: Deploy Playwright report
    needs: playwright
    if: always() && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
